services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pedidos_db
      MYSQL_USER: pedidos_user
      MYSQL_PASSWORD: pedidos_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3307:3306"

  app-sync:
    build:
      context: .
      dockerfile: app-sync/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: pedidos_db
      DB_USERNAME: pedidos_user
      DB_PASSWORD: pedidos_pass
    ports:
      - "8080:8080"

  app-reactive:
    build:
      context: .
      dockerfile: app-reactive/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: pedidos_db
      DB_USERNAME: pedidos_user
      DB_PASSWORD: pedidos_pass
    ports:
      - "8081:8081"

volumes:
  mysql_data:
